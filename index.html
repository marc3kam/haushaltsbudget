<html lang="de">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;-webkit-tap-highlight-color:transparent;font-family:system-ui,-apple-system,sans-serif}
input,select,button,textarea{font-family:inherit}
input[type=date]::-webkit-calendar-picker-indicator{filter:var(--date-icon-filter,invert(1))}
#root{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:76px;background:var(--bg)}

/* Theme vars */
:root{
  --bg:#0d1117;--card:#161b22;--raised:#21262d;--border:#30363d;
  --green:#2ea043;--green-hi:#3fb950;--text:#e6edf3;--muted:#8b949e;
  --danger:#f85149;--warn:#e3b341;--blue:#388bfd;--purple:#a855f7;--income:#3fb950;
}
.theme-light{
  --bg:#f6f8fa;--card:#fff;--raised:#f0f2f5;--border:#d0d7de;
  --green:#1a7f37;--green-hi:#2da44e;--text:#1f2328;--muted:#656d76;
  --danger:#cf222e;--warn:#9a6700;--blue:#0969da;--purple:#8250df;--income:#1a7f37;
  --date-icon-filter:none;
}


/* Reusable classes */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
.row{display:flex;align-items:center}
.inp{width:100%;background:var(--raised);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:14px;outline:none;margin-bottom:10px}
.inp:focus{border-color:var(--blue)}
.btn{border:none;border-radius:8px;padding:10px 16px;font-weight:700;cursor:pointer;font-size:13px}
.btn-green{background:var(--green);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-raised{background:var(--raised);border:1px solid var(--border);color:var(--text)}
.btn-danger{background:transparent;border:1px solid var(--danger);color:var(--danger)}
.lbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.8px;margin-bottom:4px;margin-top:2px}
.sec-title{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:8px}
.pill{padding:5px 10px;border-radius:20px;font-size:11px;border:1px solid var(--border);background:var(--raised);color:var(--muted);cursor:pointer}
.pill.on{border-color:var(--green);background:rgba(46,160,67,.15);color:var(--green-hi);font-weight:700}
.toggle{display:flex;background:var(--raised);border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.toggle button{flex:1;padding:5px 8px;border:none;font-size:10px;font-weight:700;cursor:pointer;background:transparent;color:var(--muted)}
.toggle button.on{background:var(--green);color:#fff}
.bar-track{background:var(--raised);border-radius:6px;height:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .4s}
.bar5{height:5px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end}
.overlay-box{width:100%;max-width:430px;margin:0 auto;background:var(--card);border-radius:16px 16px 0 0;padding:20px;max-height:92vh;overflow-y:auto}
.cat-row{display:flex;align-items:center;gap:6px;padding:9px 12px;cursor:pointer;color:var(--text)}
.cat-row:hover{background:var(--raised)}
.cat-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.tag{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700}
.spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.fab{position:fixed;bottom:82px;right:16px;width:54px;height:54px;border-radius:50%;background:var(--green);border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(46,160,67,.4);z-index:50;display:flex;align-items:center;justify-content:center}
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:40;overflow-x:auto}
nav button{flex:0 0 auto;min-width:56px;padding:8px 4px 6px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;color:var(--muted);font-size:9px;position:relative}
nav button.on{color:var(--green)}
nav button .ic{font-size:17px}
.badge{position:absolute;top:5px;right:10%;background:var(--purple);color:#fff;font-size:8px;font-weight:800;border-radius:10px;padding:1px 4px}
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:10px 14px 8px;position:sticky;top:0;z-index:30}
.chip{display:flex;align-items:center;gap:3px;padding:3px 7px;border-radius:20px;cursor:pointer;font-size:10px;font-weight:700;border:1px solid var(--border);background:var(--raised)}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex-shrink:0}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center}
.stat-ic{font-size:16px}
.stat-lb{font-size:10px;color:var(--muted);margin-top:2px}
.stat-val{font-size:12px;font-weight:800;margin-top:2px}
.exp-row{background:var(--card);border-radius:10px;padding:10px 12px;margin-bottom:7px;border:1px solid var(--border);display:flex;align-items:center;gap:10px}
.exp-row.warranty{border-color:rgba(168,85,247,.4)}
.rec-row{background:var(--card);border-radius:10px;padding:11px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.warr-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;border:2px solid}
.year-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.login-box{width:100%;max-width:380px}
.login-title{text-align:center;margin-bottom:28px}
.photo-preview{width:100%;border-radius:8px;max-height:150px;object-fit:cover}
.sel{background:var(--raised);border:1px solid var(--border);border-radius:7px;padding:5px 7px;color:var(--text);font-size:11px;cursor:pointer;outline:none}
.icon-btn{background:var(--raised);border:1px solid var(--border);border-radius:6px;padding:3px 8px;color:var(--text);cursor:pointer;font-size:12px}
.del-btn{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer}
.x-btn{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1;padding:0}
.ico-pick button{width:36px;height:36px;border-radius:7px;font-size:17px;cursor:pointer}
.col-pick button{width:28px;height:28px;border-radius:50%;cursor:pointer}
.drop-list{background:var(--raised);border:1px solid var(--border);border-radius:8px;margin-top:2px;overflow:hidden}
.drop-list input{width:100%;background:var(--card);border:none;border-bottom:1px solid var(--border);padding:8px 12px;color:var(--text);font-size:13px;outline:none}
.drop-scroll{max-height:150px;overflow-y:auto}
.spinner-wrap{position:fixed;inset:0;background:#0d1117;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999}
.spinner{width:38px;height:38px;border:3px solid #30363d;border-top-color:#2ea043;border-radius:50%;animation:spin 1s linear infinite}
</style>
</head>
<body>
<div class="spinner-wrap" id="loading">
  <div class="spinner"></div>
  <div style="font-size:13px;color:#8b949e">App wird geladen…</div>
</div>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/17.0.2/umd/react.production.min.js"
  onerror="document.getElementById('errdiv').style.display='block';document.getElementById('errdiv').textContent='❌ React konnte nicht geladen werden. Bitte Internetverbindung prüfen und Seite neu laden.';document.getElementById('loading').style.display='none';">
</script>
<script>if(!window.React){document.getElementById('errdiv').style.display='block';document.getElementById('errdiv').textContent='❌ React nicht geladen (CDN blockiert?). Versuche die Seite neu zu laden.';document.getElementById('loading').style.display='none';}</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/17.0.2/umd/react-dom.production.min.js"
  onerror="document.getElementById('errdiv').style.display='block';document.getElementById('errdiv').textContent='❌ ReactDOM konnte nicht geladen werden.';document.getElementById('loading').style.display='none';">
</script>
<div id="errdiv" style="display:none;position:fixed;inset:0;background:#1a0000;color:#f85149;padding:20px;font-family:monospace;font-size:12px;overflow:auto;z-index:9999;white-space:pre-wrap"></div>
<script>
window.onerror=function(msg,src,line,col,err){
  document.getElementById('loading').style.display='none';
  var d=document.getElementById('errdiv');
  d.style.display='block';
  d.textContent='FEHLER:\n'+msg+'\nZeile: '+line+'\n\n'+(err&&err.stack?err.stack:'');
};
window.onunhandledrejection=function(e){
  document.getElementById('loading').style.display='none';
  var d=document.getElementById('errdiv');
  d.style.display='block';

<script>

'use strict';
const {useState,useEffect,useRef,useMemo,useCallback,createElement:h,Fragment} = React;
// Short alias: h(tag, props, ...children)

// ── Constants ─────────────────────────────────────────────────────────────────
const THEMES = [
  {id:'dark',  name:'🌑 Dunkel'},
  {id:'light', name:'☀️ Hell'},
];
const MDE=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const MDS=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
const PAY=[{id:'cash',l:'Bargeld',i:'💵'},{id:'cc',l:'Kreditkarte',i:'💳'},{id:'twint',l:'Twint',i:'📱'},{id:'bank',l:'Bank',i:'🏦'}];
const IVLS=[{id:'daily',l:'Täglich'},{id:'weekly',l:'Wöchentlich'},{id:'monthly',l:'Monatlich'},{id:'yearly',l:'Jährlich'}];
const UCOL=['#388bfd','#3fb950','#f78166','#d2a8ff','#ffa657','#79c0ff','#ff7b72','#56d364'];
const ICONS=['🏠','🛒','👗','🚗','💊','🍽️','🎯','📦','✈️','🎓','🎮','🐾','💡','🔧','📚','🎁','🏥','⚽','🧴','💼','📥','🏦'];
const COLS=['#3b82f6','#22c55e','#a855f7','#f59e0b','#ec4899','#f97316','#06b6d4','#64748b','#ef4444','#84cc16','#14b8a6','#f43f5e'];
const DCAT=[
  {id:'c1',n:'Haushalt',i:'🏠',c:'#3b82f6',sb:500,pb:0,res:false,rsb:0,rpb:0},{id:'c2',n:'Lebensmittel',i:'🛒',c:'#22c55e',sb:600,pb:0,res:false,rsb:0,rpb:0},
  {id:'c3',n:'Kleider',i:'👗',c:'#a855f7',sb:0,pb:200,res:false,rsb:0,rpb:0},{id:'c4',n:'Transport',i:'🚗',c:'#f59e0b',sb:0,pb:150,res:false,rsb:0,rpb:0},
  {id:'c5',n:'Gesundheit',i:'💊',c:'#ec4899',sb:100,pb:50,res:false,rsb:0,rpb:0},{id:'c6',n:'Restaurant',i:'🍽️',c:'#f97316',sb:200,pb:100,res:false,rsb:0,rpb:0},
  {id:'c7',n:'Freizeit',i:'🎯',c:'#06b6d4',sb:0,pb:150,res:false,rsb:0,rpb:0},{id:'c8',n:'Sonstiges',i:'📦',c:'#64748b',sb:100,pb:50,res:false,rsb:0,rpb:0},
];
const DICAT=[{id:'ic1',n:'Lohn',i:'💼',c:'#22c55e'},{id:'ic2',n:'Bonus',i:'🎁',c:'#f59e0b'},{id:'ic3',n:'Rente',i:'🏦',c:'#3b82f6'},{id:'ic4',n:'Sonstiges',i:'📥',c:'#64748b'}];
const INIT={accounts:[],cats:DCAT,icats:DICAT,expenses:[],recurring:[],month:fmtM(),view:'shared',reserves:{}};

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtM(d=new Date()){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function fmtC(n,s=false){const v=Math.abs(+n||0).toFixed(2);return s?((+n>=0?'+':'-')+'CHF '+v):'CHF '+v;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

// ── Reserve helpers ───────────────────────────────────────────────────────────
function calcReserve(cat, data, currentMonth, view, userId) {
  const monthlySave = view === 'shared' ? (cat.rsb||0) : (cat.rpb||0);
  if (!monthlySave || !cat.res) return null;

  // Count months back (max 24)
  const startDate = new Date(currentMonth + '-01');
  startDate.setMonth(startDate.getMonth() - 23);
  const start = startDate;
  const cur = new Date(currentMonth + '-01');
  const months = (cur.getFullYear()-start.getFullYear())*12+(cur.getMonth()-start.getMonth())+1;
  const accumulated = monthlySave * months;

  // Total spent all time up to current month
  const totalSpent = data.expenses.filter(e=>
    e.catId===cat.id && e.month<=currentMonth &&
    (view==='shared'?e.shared:(!e.shared&&e.uid===userId)) &&
    e.type!=='income'
  ).reduce((s,e)=>s+e.amt, 0);

  const available = Math.max(0, accumulated - totalSpent);

  // Next due date calculation
  let nextDue = null, daysUntil = null, amountDue = null, shortage = null;
  if (cat.rdueMonth) {
    // rdueMonth = 1-12, rinterval = how many months between payments
    const interval = cat.rinterval || 1;
    const dueAmount = monthlySave * interval;
    const now = new Date(currentMonth + '-01');
    // Find next occurrence of due month
    let next = new Date(now.getFullYear(), cat.rdueMonth - 1, 1);
    if (next <= now) next.setFullYear(next.getFullYear() + 1);
    // Check if within interval
    const monthsUntil = (next.getFullYear()-now.getFullYear())*12+(next.getMonth()-now.getMonth());
    if (monthsUntil <= interval) {
      nextDue = fmtM(next);
      daysUntil = Math.round((next - new Date()) / 864e5);
      amountDue = dueAmount;
      shortage = Math.max(0, amountDue - available);
    }
  }

  return { monthlySave, accumulated, totalSpent, available, nextDue, daysUntil, amountDue, shortage };
}
function mlabel(k){const[y,m]=k.split('-');return MDE[+m-1]+' '+y;}
function prevM(k){const d=new Date(k+'-01');d.setMonth(d.getMonth()-1);return fmtM(d);}
function nextM(k){const d=new Date(k+'-01');d.setMonth(d.getMonth()+1);return fmtM(d);}
function advD(d,iv){const n=new Date(d);if(iv==='daily')n.setDate(n.getDate()+1);else if(iv==='weekly')n.setDate(n.getDate()+7);else if(iv==='monthly')n.setMonth(n.getMonth()+1);else n.setFullYear(n.getFullYear()+1);return n;}
function wdays(e){if(!e)return null;return Math.ceil((new Date(e)-new Date())/864e5);}
async function hashPw(pw){const d=new TextEncoder().encode(pw+'hb_salt_2024');const h=await crypto.subtle.digest('SHA-256',d);return [...new Uint8Array(h)].map(b=>b.toString(16).padStart(2,'0')).join('');}
function getSess(){
  try{
    // Check sessionStorage first, then localStorage (remember me)
    const s=sessionStorage.getItem('hb_s')||localStorage.getItem('hb_s_persist');
    return s?JSON.parse(s):null;
  }catch{return null;}
}
function saveSess(u,remember){
  sessionStorage.setItem('hb_s',JSON.stringify(u));
  if(remember)localStorage.setItem('hb_s_persist',JSON.stringify(u));
  else localStorage.removeItem('hb_s_persist');
}
function clrSess(){
  sessionStorage.removeItem('hb_s');
  localStorage.removeItem('hb_s_persist');
}
function setThemeClass(id){document.documentElement.className=id==='dark'?'':'theme-'+id;}
function compress(file,mw=1200,q=0.75){return new Promise(r=>{const img=new Image(),rd=new FileReader();rd.onload=e=>{img.onload=()=>{const ratio=Math.min(1,mw/img.width),cv=document.createElement('canvas');cv.width=img.width*ratio;cv.height=img.height*ratio;cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);r(cv.toDataURL('image/jpeg',q));};img.src=e.target.result;};rd.readAsDataURL(file);});}

// ── Recurring engine ──────────────────────────────────────────────────────────
function processRec(data,set){
  const today=new Date().toISOString().slice(0,10);
  const ne=[...data.expenses];let changed=false;
  const ur=(data.recurring||[]).map(r=>{
    if(!r.active)return r;
    const from=r.lastP?advD(new Date(r.lastP),r.iv).toISOString().slice(0,10):r.start;
    if(from>today)return r;
    let cur=new Date(from);const end=r.end?new Date(r.end):new Date('2099-12-31');const dates=[];
    while(cur<=new Date(today)&&cur<=end){dates.push(cur.toISOString().slice(0,10));cur=advD(cur,r.iv);}
    dates.forEach(date=>{
      if(!ne.some(e=>e.rid===r.id&&e.date===date)){changed=true;ne.push({id:uid(),month:date.slice(0,7),date,amt:r.amt,catId:r.catId,uid:r.uid,uname:r.uname,ucol:r.ucol,payId:r.payId||'bank',note:r.note,shared:r.shared,type:r.type||'expense',rid:r.id,rname:r.name,isW:false,photo:null});}
    });
    const lp=dates.length>0?dates[dates.length-1]:r.lastP;
    if(lp!==r.lastP){changed=true;return{...r,lastP:lp};}
    return r;
  });
  if(changed)set({expenses:ne,recurring:ur});
}

// ── Drive ─────────────────────────────────────────────────────────────────────
async function loadGSI(){if(window.google?.accounts?.oauth2)return;await new Promise((res,rej)=>{if(document.getElementById('gsi')){setTimeout(res,500);return;}const s=document.createElement('script');s.id='gsi';s.src='https://accounts.google.com/gsi/client';s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
function reqTok(cid){return new Promise((res,rej)=>window.google.accounts.oauth2.initTokenClient({client_id:cid,scope:'https://www.googleapis.com/auth/drive.file',callback:r=>r.error?rej(r.error):res(r.access_token)}).requestAccessToken({prompt:''}));}
async function dWrite(tok,fid,data){const b=JSON.stringify(data);if(fid){const r=await fetch('https://www.googleapis.com/upload/drive/v3/files/'+fid+'?uploadType=media',{method:'PATCH',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:b});if(!r.ok)throw new Error('Drive '+r.status);return fid;}const m=await fetch('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify({name:'haushaltsbudget.json',mimeType:'application/json'})}).then(r=>r.json());await fetch('https://www.googleapis.com/upload/drive/v3/files/'+m.id+'?uploadType=media',{method:'PATCH',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:b});return m.id;}
async function dRead(tok,fid){const r=await fetch('https://www.googleapis.com/drive/v3/files/'+fid+'?alt=media',{headers:{Authorization:'Bearer '+tok}});if(!r.ok)throw new Error('Drive '+r.status);return r.json();}

// ── UI helpers ────────────────────────────────────────────────────────────────
function Bar({pct,col,h5=false}){
  return h('div',{className:'bar-track'+(h5?' bar5':'')},
    h('div',{className:'bar-fill',style:{width:(Math.min(pct,1)*100).toFixed(1)+'%',background:col}})
  );
}

function ReserveBadge({cat,data,month,view,userId}){
  const rv = calcReserve(cat, data, month, view, userId);
  if(!rv) return null;
  const hasShortage = rv.shortage > 0;
  const col = hasShortage ? 'var(--danger)' : rv.available >= rv.monthlySave ? 'var(--green)' : 'var(--warn)';
  return h('div',{style:{marginTop:6,padding:'8px 10px',background:'var(--raised)',borderRadius:8,border:'1px solid '+col+'44'}},
    h('div',{className:'row',style:{justifyContent:'space-between',marginBottom:4}},
      h('span',{style:{fontSize:10,color:'var(--muted)'}},'🏦 Rückstellung'),
      h('span',{style:{fontSize:11,fontWeight:700,color:col}},'Verfügbar: '+fmtC(rv.available))
    ),
    h('div',{style:{fontSize:10,color:'var(--muted)',marginBottom:rv.nextDue?4:0}},
      '+'+fmtC(rv.monthlySave)+'/Mt · Angespart: '+fmtC(rv.accumulated)+' · Ausgaben: '+fmtC(rv.totalSpent)
    ),
    rv.nextDue&&h('div',{style:{fontSize:10,color:hasShortage?'var(--danger)':'var(--warn)',fontWeight:600}},
      '📅 Fällig: '+MDE[+rv.nextDue.split('-')[1]-1]+' '+rv.nextDue.split('-')[0]+
      (rv.daysUntil<=30?' (in '+rv.daysUntil+' Tagen)':'')+
      ' · '+fmtC(rv.amountDue)+
      (hasShortage?' · ⚠️ Fehlend: '+fmtC(rv.shortage):'')
    )
  );
}
function Overlay({children,onClose}){
  return h('div',{className:'overlay',onClick:e=>{if(e.target===e.currentTarget)onClose();}},
    h('div',{className:'overlay-box'},children)
  );
}
function Lbl({t}){return h('div',{className:'lbl'},t);}
function Sec({title,children}){return h('div',{style:{marginBottom:20}},h('div',{className:'sec-title'},title),children);}
function AvgIcon({name,col,size=28}){
  return h('div',{className:'avatar',style:{width:size,height:size,background:col,fontSize:size*0.45}},name[0].toUpperCase());
}


// ── ErrorBoundary ─────────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {err:null}; }
  static getDerivedStateFromError(e) { return {err:e}; }
  componentDidCatch(e,info) { console.error('App Error:',e,info); }
  render() {
    if(this.state.err) {
      return h('div',{style:{background:'#1a0000',color:'#f85149',padding:20,fontFamily:'monospace',fontSize:12,minHeight:'100vh',whiteSpace:'pre-wrap'}},
        '⚠️ App Fehler:\n\n'+this.state.err.message+'\n\n'+this.state.err.stack
      );
    }
    return this.props.children;
  }
}

<script>

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  // Clear corrupted data on startup
  try{const s=localStorage.getItem('hb_d');if(s){const p=JSON.parse(s);if(!p||!Array.isArray(p.accounts)){localStorage.removeItem('hb_d');}}}catch{localStorage.removeItem('hb_d');}
  const [tid,setTid]=useState(()=>localStorage.getItem('hb_t')||'dark');
  const [data,setData]=useState(()=>{
    try{
      const s=localStorage.getItem('hb_d');
      if(s){
        const p=JSON.parse(s);
        return {
          ...INIT,
          ...p,
          accounts: (p.accounts&&p.accounts.length)?p.accounts:INIT.accounts,
          cats: (p.cats&&p.cats.length)?p.cats:(p.categories&&p.categories.length?p.categories:INIT.cats),
          icats: (p.icats&&p.icats.length)?p.icats:(p.incomeCategories&&p.incomeCategories.length?p.incomeCategories:INIT.icats),
          expenses: Array.isArray(p.expenses)?p.expenses:[],
          recurring: Array.isArray(p.recurring)?p.recurring:[],
          month: p.month||p.currentMonth||fmtM(),
          view: p.view||p.viewMode||'shared',
        };
      }
    }catch(e){console.warn('Load error:',e);}
    return INIT;
  });
  const [sess,setSess]=useState(()=>getSess());
  const [drv,setDrv]=useState(()=>{try{const s=localStorage.getItem('hb_drive');if(s)return JSON.parse(s);}catch{}return{cid:'',fid:'',on:false};});
  const [sync,setSync]=useState({st:'idle',last:null,err:''});
  const tok=useRef(null),tokExp=useRef(0),dref=useRef(data),drvRef=useRef(drv),uTimer=useRef(null);

  useEffect(()=>{setThemeClass(tid);},[tid]);
  useEffect(()=>{dref.current=data;},[data]);
  useEffect(()=>{drvRef.current=drv;},[drv]);
  useEffect(()=>{try{localStorage.setItem('hb_d',JSON.stringify(data));}catch(e){};},[data]);
  useEffect(()=>{localStorage.setItem('hb_drive',JSON.stringify(drv));},[drv]);
  // Process recurring on mount and when month changes
useEffect(()=>{
  if(data.recurring&&data.recurring.length>0){
    processRec(data,set);
  }
},[data.month]);

  const screen=data.accounts.length===0?'setup':sess?'app':'login';
  const set=useCallback(p=>setData(d=>{
    const next={...d,...p};
    if(!next.accounts||!Array.isArray(next.accounts)) next.accounts=d.accounts||INIT.accounts;
    if(!next.cats||!Array.isArray(next.cats)) next.cats=d.cats||INIT.cats;
    if(!next.icats||!Array.isArray(next.icats)) next.icats=d.icats||INIT.icats;
    if(!next.expenses||!Array.isArray(next.expenses)) next.expenses=d.expenses||[];
    if(!next.recurring||!Array.isArray(next.recurring)) next.recurring=d.recurring||[];
    return next;
  }),[]);
  const setD=useCallback(p=>setDrv(d=>({...d,...p})),[]);
  const chT=useCallback(id=>{localStorage.setItem('hb_t',id);setTid(id);},[]);

  const getTok=useCallback(async()=>{
    if(tok.current&&Date.now()<tokExp.current)return tok.current;
    const{cid}=drvRef.current;if(!cid)throw new Error('Keine Client-ID');
    await loadGSI();const t=await reqTok(cid);tok.current=t;tokExp.current=Date.now()+35e5;return t;
  },[]);
  const doUp=useCallback(async()=>{
    const cfg=drvRef.current;
    if(!cfg.on||!cfg.cid)return;
    // Safety: don't upload if data is corrupt
    const d=dref.current;
    if(!d||!Array.isArray(d.accounts)||!Array.isArray(d.cats)){
      setSync({st:'error',last:null,err:'Lokale Daten unvollständig'});
      return;
    }
    setSync(s=>({...s,st:'syncing'}));
    try{
      const t=await getTok();
      const payload={...d,_ts:Date.now()};
      const fid=await dWrite(t,cfg.fid||null,payload);
      if(fid!==cfg.fid)setD({fid});
      setSync({st:'ok',last:Date.now(),err:''});
    }
    catch(e){tok.current=null;setSync({st:'error',last:null,err:String(e.message||e)});}
  },[getTok,setD]);
  const doDn=useCallback(async()=>{
    const d=drvRef.current;
    if(!d.on||!d.cid||!d.fid)return;
    try{
      const t=await getTok();
      const raw=await dRead(t,d.fid);
      // Only update if remote is newer
      if(!raw||!raw._ts||(raw._ts<=(dref.current._ts||0))){
        setSync(s=>({...s,st:'ok',last:Date.now()}));
        return;
      }
      // Always keep local accounts (never overwrite with remote accounts that might be empty)
      const localAccounts=dref.current.accounts&&dref.current.accounts.length
        ?dref.current.accounts
        :(raw.accounts||raw.users||INIT.accounts);
      // Migrate: support both old field names and new
      const merged={
        ...INIT,
        // Accounts: always use local if available
        accounts: localAccounts,
        // Categories
        cats: raw.cats||raw.categories||INIT.cats,
        icats: raw.icats||raw.incomeCategories||INIT.icats,
        // Settings
        month: raw.month||raw.currentMonth||dref.current.month,
        view: raw.view||raw.viewMode||dref.current.view,
        // Expenses: migrate field names
        expenses: (raw.expenses||[]).map(e=>({
          id: e.id||uid(),
          month: e.month||(e.date||'').slice(0,7),
          date: e.date||'',
          amt: e.amt!==undefined?e.amt:(e.amount||0),
          catId: e.catId||'',
          uid: e.uid||e.userId||e.user_id||'',
          uname: e.uname||e.userName||e.user_name||'',
          ucol: e.ucol||e.userColor||'#388bfd',
          payId: e.payId||e.paymentId||'cash',
          note: e.note||'',
          shared: e.shared!==undefined?e.shared:true,
          type: e.type||'expense',
          isW: !!(e.isW||e.isWarranty),
          wexp: e.wexp||e.warrantyExpiry||'',
          wnote: e.wnote||e.warrantyNote||'',
          photo: e.photo||e.receiptData||null,
          rid: e.rid||e.recurringId||null,
          rname: e.rname||e.recurringName||'',
        })),
        // Recurring
        recurring: (raw.recurring||[]).map(r=>({
          ...r,
          amt: r.amt!==undefined?r.amt:(r.amount||0),
          iv: r.iv||r.interval||'monthly',
        })),
        // Reserves
        reserves: raw.reserves||{},
        _ts: raw._ts,
      };
      setData(merged);
      setSync(s=>({...s,st:'ok',last:Date.now()}));
    }
    catch(e){
      tok.current=null;
      setSync(s=>({...s,st:'error',err:String(e.message||e)}));
    }
  },[getTok]);

  useEffect(()=>{if(!drv.on)return;setSync(s=>({...s,st:'waiting'}));clearTimeout(uTimer.current);uTimer.current=setTimeout(doUp,3000);return()=>clearTimeout(uTimer.current);},[data,drv.on,doUp]);
  useEffect(()=>{const fn=()=>{if(!document.hidden)doDn();};document.addEventListener('visibilitychange',fn);return()=>document.removeEventListener('visibilitychange',fn);},[doDn]);
  useEffect(()=>{if(!drv.on)return;const id=setInterval(doDn,12e4);return()=>clearInterval(id);},[drv.on,doDn]);
  useEffect(()=>{if(drv.on&&drv.fid)doDn();},[]);

  const connect=async()=>{
    if(!drv.cid)return;
    setSync({st:'syncing',last:null,err:''});
    try{
      await loadGSI();
      const t=await reqTok(drv.cid);
      tok.current=t;tokExp.current=Date.now()+35e5;
      setD({on:true});
      setSync({st:'ok',last:Date.now(),err:''});
      // If fileId exists, try download. If empty, just upload current data.
      if(drv.fid){
        await new Promise(r=>setTimeout(r,500));
        doDn();
      }
    }
    catch(e){tok.current=null;setSync({st:'error',last:null,err:String(e.message||e)});}
  };
  const disconnect=()=>{tok.current=null;setD({on:false});setSync({st:'idle',last:null,err:''});};
  const login=async(u,pw,remember)=>{const hh=await hashPw(pw);const a=data.accounts.find(x=>x.u.toLowerCase()===u.toLowerCase()&&x.h===hh);if(!a)return false;const s={id:a.id,name:a.name,u:a.u,admin:a.admin,col:a.col};saveSess(s,remember);setSess(s);return true;};
  const logout=()=>{clrSess();setSess(null);};
  const setupAdmin=async(name,u,pw)=>{const hh=await hashPw(pw);const a={id:uid(),name,u,h:hh,admin:true,col:UCOL[0]};set({accounts:[a]});const s={id:a.id,name,u,admin:true,col:a.col};saveSess(s);setSess(s);};

  const p={data,set,sess,drv,setD,sync,connect,disconnect,doUp,doDn,tid,chT,logout};
  if(screen==='setup')return h(Setup,{onSetup:setupAdmin,tid,chT});
  if(screen==='login')return h(Login,{onLogin:login,tid,chT});
  return h(Main,p);
}

// ── ThemeSel ──────────────────────────────────────────────────────────────────
function ThemeSel({tid,chT}){
  return h('div',{style:{textAlign:'center',marginTop:14}},
    h('select',{value:tid,onChange:e=>chT(e.target.value),className:'sel'},

// ── Setup ─────────────────────────────────────────────────────────────────────

        h(Lbl,{t:'WIEDERHOLEN'}),h('input',{type:'password',value:f.p2,onInput:e=>sf(p=>({...p,p2:e.target.value})),className:'inp',style:{marginBottom:14},autoComplete:'new-password'}),
        err&&h('div',{style:{color:'var(--danger)',fontSize:12,textAlign:'center',marginBottom:10}},err),

// ── Login ─────────────────────────────────────────────────────────────────────
function Login({onLogin,tid,chT}){
  const [u,su]=useState('');
  const [pw,spw]=useState('');
  const [remember,sRem]=useState(()=>!!localStorage.getItem('hb_s_persist'));
  const [err,se]=useState('');

    if(ev)ev.preventDefault();

  };
  return h('div',{className:'login-wrap'},
    h('div',{className:'login-box'},
      h('div',{className:'login-title'},
        h('div',{style:{fontSize:46}},'🏠'),

// ── Main ──────────────────────────────────────────────────────────────────────
function Main({data,set,sess,logout,drv,setD,sync,connect,disconnect,doUp,doDn,tid,chT}){
  const [tab,setTab]=useState('dash');
  const [showAdd,setSA]=useState(false);
  const [lb,setLb]=useState(null);

  const mexp=useMemo(()=>data.expenses.filter(e=>e.month===data.month),[data.expenses,data.month]);
  const spend=useMemo(()=>{
    const ex=data.view==='shared'?mexp.filter(e=>e.shared&&e.type!=='income'):mexp.filter(e=>!e.shared&&e.uid===sess.id&&e.type!=='income');
    const m={};ex.forEach(e=>{m[e.catId]=(m[e.catId]||0)+e.amt;});return m;
  },[mexp,data.view,sess.id]);
  const minc=useMemo(()=>{
    const ex=data.view==='shared'?mexp.filter(e=>e.shared&&e.type==='income'):mexp.filter(e=>!e.shared&&e.uid===sess.id&&e.type==='income');
    return ex.reduce((s,e)=>s+e.amt,0);
  },[mexp,data.view,sess.id]);
  const tbud=data.cats.reduce((s,c)=>s+(data.view==='shared'?c.sb:c.pb),0);
  const tspent=Object.values(spend).reduce((a,b)=>a+b,0);
  const saldo=minc-tspent;
  const wcount=(data.expenses||[]).filter(e=>e.isW).length;
  const SYNCI={idle:'☁️',waiting:'⏳',syncing:'🔄',ok:'✅',error:'⚠️'};

  const sl=sync.st==='ok'&&sync.last?new Date(sync.last).toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'}):sync.st==='error'?'Fehler':sync.st==='idle'?'Offline':'Sync…';

  const tabs=[['dash','📊','Übersicht'],['hist','📋','Verlauf'],['year','📈','Jahr'],['rec','🔄','Daueraufträge'],['save','🏦','Sparkonto'],['warr','🛡️','Garantie'],['sett','⚙️','Einstellungen']];

  return h('div',{id:'root'},
    // Header
    h('div',{className:'hdr'},
      h('div',{className:'row',style:{justifyContent:'space-between',marginBottom:6}},
        h('div',{className:'row',style:{gap:8}},
          h(AvgIcon,{name:sess.name,col:sess.col}),
          h('div',null,
            h('div',{style:{fontSize:13,fontWeight:700,color:'var(--text)'}},sess.name),
            sess.admin&&h('div',{style:{fontSize:9,color:'var(--warn)',fontWeight:700}},'ADMIN')
          )
        ),
        h('div',{className:'row',style:{gap:5}},
          h('div',{className:'chip',onClick:()=>{drv.on&&doDn();setTab('sett');},style:{color:SYNCC[sync.st]}},
            h('span',{className:sync.st==='syncing'?'spin':''},SYNCI[sync.st]),
            h('span',{style:{marginLeft:3}},sl)
          ),
          h('select',{value:tid,onChange:e=>chT(e.target.value),className:'sel'},THEMES.map(t=>h('option',{key:t.id,value:t.id},t.name))),
          h('button',{onClick:logout,className:'btn btn-raised',style:{padding:'4px 8px',fontSize:11}},'Logout')
        )
      ),
      h('div',{className:'row',style:{justifyContent:'space-between'}},
        h('div',{className:'toggle'},
          h('button',{className:data.view==='shared'?'on':'',onClick:()=>set({view:'shared'})},'🏠 Haushalt'),
          h('button',{className:data.view==='personal'?'on':'',onClick:()=>set({view:'personal'})},'👤 Persönlich')
        ),
        h('div',{className:'row',style:{gap:4}},
          h('button',{onClick:()=>set({month:prevM(data.month)}),style:{background:'none',border:'none',color:'var(--muted)',fontSize:20,cursor:'pointer',padding:'0 4px'}},'‹'),
          h('div',{style:{textAlign:'center'}},
            h('div',{style:{fontWeight:700,fontSize:13,color:'var(--text)'}},mlabel(data.month)),
            h('div',{style:{fontSize:10,fontWeight:600,color:saldo>=0?'var(--income)':'var(--danger)'}},fmtC(saldo,true))
          ),
          h('button',{onClick:()=>set({month:nextM(data.month)}),style:{background:'none',border:'none',color:'var(--muted)',fontSize:20,cursor:'pointer',padding:'0 4px'}},'›')
        )
      )
    ),
    // Content
    h('div',{style:{padding:'12px 14px'}},
      tab==='dash'&&h(Dash,{data,spend,tbud,tspent,minc,saldo,sess}),
      tab==='hist'&&h(Hist,{data,set,sess,onPhoto:setLb}),
      tab==='year'&&h(Year,{data,sess}),
      tab==='rec' &&h(Rec,{data,set,sess}),
      tab==='save'&&h(Sparkonto,{data,sess}),
      tab==='warr'&&h(Warr,{data,set,sess,onPhoto:setLb}),
      tab==='sett'&&h(Sett,{data,set,sess,drv,setD,sync,connect,disconnect,doUp,doDn})
    ),
    // FAB
    h('button',{className:'fab',onClick:()=>setSA(true)},'＋'),
    // Nav
    h('nav',null,tabs.map(([id,ic,lb])=>
      h('button',{key:id,className:tab===id?'on':'',onClick:()=>setTab(id)},
        h('span',{className:'ic'},ic),
        id==='warr'&&wcount>0&&h('span',{className:'badge'},wcount),
        lb
      )
    )),
    showAdd&&h(Add,{data,set,sess,onClose:()=>setSA(false)}),
    lb&&h('div',{onClick:()=>setLb(null),style:{position:'fixed',inset:0,background:'rgba(0,0,0,.92)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}},
      h('img',{src:lb,style:{maxWidth:'95vw',maxHeight:'90vh',borderRadius:8,objectFit:'contain'}}),
      h('div',{style:{position:'absolute',top:16,right:16,color:'#fff',fontSize:28}},'×')
    )
  );
}

<script>
// ── Dashboard ─────────────────────────────────────────────────────────────────
function Dash({data,spend,tbud,tspent,minc,saldo,sess}){
  const pct=tbud>0?Math.min(tspent/tbud,1):0;
  const tc=pct>.9?'var(--danger)':pct>.7?'var(--warn)':'var(--green)';

        h('div',{key:lb,className:'stat-card'},h('div',{className:'stat-ic'},ic),h('div',{className:'stat-lb'},lb),h('div',{className:'stat-val',style:{color:c}},fmtC(v)))
      )
    ),
    h('div',{className:'card',style:{marginBottom:12}},
      h('div',{className:'row',style:{justifyContent:'space-between',marginBottom:8}},
        h('div',null,h('div',{className:'lbl'},'AUSGEGEBEN'),h('div',{style:{fontSize:22,fontWeight:800,color:'var(--danger)'}},fmtC(tspent))),
        h('div',{style:{textAlign:'right'}},h('div',{className:'lbl'},'BUDGET'),h('div',{style:{fontSize:22,fontWeight:800,color:'var(--text)'}},fmtC(tbud)))
      ),
      h(Bar,{pct,col:tc}),
      h('div',{style:{textAlign:'center',marginTop:6,fontSize:12,fontWeight:700,color:tc}},pct>=1?'⚠️ Budget überschritten!':fmtC(tbud-tspent)+' verfügbar ('+(pct*100).toFixed(0)+'%)')
    ),
    h('div',{style:{display:'flex',flexDirection:'column',gap:8}},
      data.cats.map(cat=>{
        const bud=data.view==='shared'?cat.sb:cat.pb,sp=spend[cat.id]||0;
        if(!bud&&!sp)return null;
        const p=bud>0?Math.min(sp/bud,1):0,col=p>.9?'var(--danger)':p>.7?'var(--warn)':cat.c;
        return h('div',{key:cat.id,className:'card',style:{borderColor:p>=1?'var(--danger)':'var(--border)'}},
          h('div',{className:'row',style:{justifyContent:'space-between',marginBottom:bud?6:0}},
            h('div',{className:'row',style:{gap:10}},
              h('div',{className:'cat-icon',style:{background:cat.c+'22'}},cat.i),

<script>
// ── Sparkonto Übersicht ───────────────────────────────────────────────────────
function Sparkonto({data,sess}){
  const allViews = data.view === 'shared'
    ? [{view:'shared', label:'🏠 Haushalt', userId:null}]
    : [{view:'personal', label:'👤 Persönlich', userId:sess.id}];

  const items = [];
  data.cats.forEach(cat => {
    if (!cat.res) return;
    allViews.forEach(({view, label, userId}) => {
      const rv = calcReserve(cat, data, data.month, view, userId||sess.id);
      if (!rv) return;
      items.push({cat, rv, view, label});
    });
  });

  const totalMonthly = items.reduce((s,x)=>s+x.rv.monthlySave, 0);
  const totalAvailable = items.reduce((s,x)=>s+x.rv.available, 0);
  const totalShortage = items.reduce((s,x)=>s+(x.rv.shortage||0), 0);

  // Group by due soon (within 2 months) vs rest
  const soon = items.filter(x=>x.rv.nextDue);
  const rest = items.filter(x=>!x.rv.nextDue);

  if (!items.length) return h('div',{style:{textAlign:'center',color:'var(--muted)',padding:40,fontSize:14}},
    'Keine Rückstellungen aktiv.',h('br'),h('span',{style:{fontSize:12}},'Kategorie bearbeiten → 🏦 Rückstellung aktivieren')
  );

  return h(Fragment,null,
    // Summary card
    h('div',{className:'card',style:{marginBottom:14}},

      h('div',{className:'grid3',style:{marginBottom:0}},
        h('div',{className:'stat-card'},h('div',{className:'stat-lb'},'Monatlich'),h('div',{className:'stat-val',style:{color:'var(--blue)'}},fmtC(totalMonthly))),
        h('div',{className:'stat-card'},h('div',{className:'stat-lb'},'Angespart'),h('div',{className:'stat-val',style:{color:'var(--green)'}},fmtC(totalAvailable))),
        h('div',{className:'stat-card'},h('div',{className:'stat-lb'},'Fehlend'),h('div',{className:'stat-val',style:{color:totalShortage>0?'var(--danger)':'var(--muted)'}},fmtC(totalShortage)))
      )
    ),

    // Transfer box
    h('div',{style:{background:'var(--blue)15',border:'1px solid var(--blue)44',borderRadius:12,padding:14,marginBottom:14}},
      h('div',{style:{fontSize:12,fontWeight:700,color:'var(--blue)',marginBottom:6}},'💸 MONATLICHE ÜBERWEISUNG AUF SPARKONTO'),
      h('div',{style:{fontSize:24,fontWeight:800,color:'var(--blue)'}},fmtC(totalMonthly)),
      h('div',{style:{fontSize:11,color:'var(--muted)',marginTop:4}},'Diesen Betrag jeden Monat auf das Sparkonto überweisen damit alle Rückstellungen gedeckt sind.')

    soon.length>0&&h(Fragment,null,
      h('div',{className:'sec-title',style:{marginBottom:8}},'📅 BALD FÄLLIG'),
      soon.map(({cat,rv,label})=>{

        const dueLabel = MDE[+rv.nextDue.split('-')[1]-1]+' '+rv.nextDue.split('-')[0];
        return h('div',{key:cat.id+'_soon',style:{background:'var(--card)',borderRadius:10,padding:12,marginBottom:8,border:'2px solid '+(hasShortage?'rgba(248,81,73,.4)':'rgba(63,185,80,.3)')}},
          h('div',{className:'row',style:{justifyContent:'space-between',marginBottom:6}},
            h('div',{className:'row',style:{gap:8}},
              h('div',{className:'cat-icon',style:{background:cat.c+'22',width:32,height:32,fontSize:16}},cat.i),
              h('div',null,h('div',{style:{fontWeight:700,fontSize:13,color:'var(--text)'}},cat.n),h('div',{style:{fontSize:10,color:'var(--muted)'}},label))
            ),
            h('div',{style:{textAlign:'right'}},
              h('div',{style:{fontSize:13,fontWeight:800,color:'var(--text)'}},fmtC(rv.amountDue)),

            h('div',{className:'row',style:{justifyContent:'space-between',marginBottom:3}},

              h('span',{style:{fontSize:11,fontWeight:700,color:col}},hasShortage?'⚠️ Fehlend: '+fmtC(rv.shortage):'✅ Gedeckt')
            ),

}

  const act=ws.filter(e=>!e.wexp||(wdays(e.wexp)||1)>0),expd=ws.filter(e=>e.wexp&&(wdays(e.wexp)||1)<=0);
  const shown=[...act,...(showExp?expd:[])];

          h('div',{style:{fontSize:12,color:col,fontWeight:700}},isE?'⛔ Abgelaufen':isS?'⚠️ Läuft in '+days+' Tagen ab':'✅ '+(days!=null?'Noch '+days+' Tage gültig':'Kein Ablaufdatum')),
          e.wexp&&h('div',{style:{fontSize:11,color:'var(--muted)',marginTop:2}},'Bis: '+new Date(e.wexp).toLocaleDateString('de-CH')),
